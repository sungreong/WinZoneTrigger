name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish installer
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          test -f dist/WinZoneTrigger_Setup.exe
          gh release create "$TAG_NAME" dist/WinZoneTrigger_Setup.exe \
            --repo "$GITHUB_REPOSITORY" \
            --title "WinZoneTrigger $TAG_NAME" \
            --notes "Installer: WinZoneTrigger_Setup.exe" \
            --latest
